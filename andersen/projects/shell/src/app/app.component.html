<main class="min-h-screen flex flex-col bg-cover bg-center bg-no-repeat bg-fixed"
  [style.background-image]="'url(/assets/background.webp)'">
  <lib-header>
    <div>
    @if (user$ | async; as user) {
      <button mat-raised-button (click)="dispatchEvent('onLogout')">Sign Out</button>
      <button mat-raised-button (click)="dispatchEvent('navigateToTodo')">Todo</button>
      <button mat-raised-button (click)="dispatchEvent('navigateToUser')">User</button>
    } @else {
      <button mat-raised-button (click)="dispatchEvent(OUT_GOING_EVENTS.TO_SIGN_IN)">Sign In</button>
      <button mat-raised-button (click)="dispatchEvent(OUT_GOING_EVENTS.TO_SIGN_UP)">Sign Up</button>
    }
    </div>
  </lib-header>
  <div class="flex-1">
    <router-outlet />
  </div>
  <lib-footer>This is Shell 2026</lib-footer>
</main>
