<main class="min-h-screen flex flex-col bg-cover bg-center bg-no-repeat bg-fixed"
  [style.background-image]="'url(/assets/background.webp)'">
  <lib-header>
    <div header-navigation class="w-full flex items-center flex-row-reverse justify-around gap-3">
      @if (headerSlot.header(); as navComp) {
      <ng-container *ngComponentOutlet="navComp"></ng-container>
      }
      @if (headerSlot.todo(); as todoComp) {
      <ng-container *ngComponentOutlet="todoComp"></ng-container>
      }
    </div>
  </lib-header>
  <div class="flex-1">
    <router-outlet />
  </div>
  <lib-footer>This is Shell 2026</lib-footer>
</main>
