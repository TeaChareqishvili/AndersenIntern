<button mat-icon-button [matMenuTriggerFor]="languageMenu" aria-label="Select language">
  <mat-icon>language</mat-icon>
</button>
<mat-menu #languageMenu="matMenu">
  <button mat-menu-item (click)="switchLang('en')">English</button>
  <button mat-menu-item (click)="switchLang('ka')">ქართული</button>
  <button mat-menu-item (click)="switchLang('ru')">Русский</button>
</mat-menu>
