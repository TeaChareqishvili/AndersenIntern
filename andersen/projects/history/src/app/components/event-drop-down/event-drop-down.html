<mat-form-field appearance="outline" class="event-filter w-64 mb-4">
  <mat-select [value]="selectedEvent()" [placeholder]="'history.allEvents' | translate"
    (selectionChange)="onEventFilterChange($event.value)">
    <mat-option [value]="null">{{ 'history.allEvents' | translate }}</mat-option>
    @for (event of eventOptions; track event) {
    <mat-option [value]="event">
      {{ event }}
    </mat-option>
    }
  </mat-select>
</mat-form-field>
