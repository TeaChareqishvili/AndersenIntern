<app-auth-form [form]="form" [title]="'auth.signIn' | translate" [showRessetButton]="true"
  [submitText]="'auth.logIn' | translate" [ressetText]="'auth.resetPassword' | translate" [loading]="loading()"
  (submitUser)="onLogin($event)"
  (submitReset)="onResetPassword($event)" />

@if (loading()) {
<lib-loader />
}
